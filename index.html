<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaFlow — Video Yükləyici</title>
  <meta name="description" content="YouTube, Instagram və TikTok videolarını yükləyin" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <header class="header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="8" fill="#3B82F6"/>
        <path d="M10 9L20 14L10 19V9Z" fill="white"/>
      </svg>
      <span>MediaFlow</span>
    </div>
    <div class="header-badge">Şəxsi İstifadə</div>
  </header>

  <main class="main">
    <section class="hero">
      <h1 class="hero-title">
        Videonu yüklə,<br />
        <span class="accent">sürətlə.</span>
      </h1>
      <p class="hero-sub">YouTube · Instagram · TikTok</p>
    </section>

    <!-- URL Input -->
    <div class="input-card" id="inputSection">
      <div class="input-wrapper">
        <div class="platform-indicator" id="platformIndicator">
          <span class="platform-icon" id="platformIcon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#555" stroke-width="1.5"/><path d="M7 10h6M10 7v6" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg>
          </span>
        </div>
        <input
          type="url"
          id="urlInput"
          class="url-input"
          placeholder="Link yapışdırın… (YouTube, Instagram, TikTok)"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <button class="clear-btn" id="clearBtn" aria-label="Təmizlə" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="#888" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="input-hint" id="inputHint">Linki yuxarıya yapışdırın</div>

      <button class="fetch-btn" id="fetchBtn" disabled>
        <span class="fetch-btn-text">Məlumatları Yüklə</span>
        <span class="fetch-btn-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9h12M9 4l6 5-6 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </button>
    </div>

    <!-- Loading State -->
    <div class="loading-card" id="loadingCard" style="display:none;">
      <div class="spinner"></div>
      <p class="loading-text" id="loadingText">Məlumatlar alınır…</p>
    </div>

    <!-- Error State -->
    <div class="error-card" id="errorCard" style="display:none;">
      <div class="error-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#EF4444" stroke-width="1.5"/><path d="M12 7v6M12 16.5v.5" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <p class="error-title" id="errorTitle">Xəta baş verdi</p>
      <p class="error-msg" id="errorMsg"></p>
      <button class="retry-btn" id="retryBtn">Yenidən Cəhd Et</button>
    </div>

    <!-- Video Info Card -->
    <div class="video-card" id="videoCard" style="display:none;">
      <div class="video-meta">
        <div class="thumbnail-wrap">
          <img id="thumbnail" src="" alt="Thumbnail" class="thumbnail" />
          <div class="duration-badge" id="durationBadge"></div>
        </div>
        <div class="video-info">
          <div class="platform-tag" id="platformTag"></div>
          <h2 class="video-title" id="videoTitle"></h2>
          <p class="video-author" id="videoAuthor"></p>
        </div>
      </div>

      <!-- Format Selection -->
      <div class="format-section">
        <div class="format-tabs">
          <button class="format-tab active" id="tabVideo" data-type="video">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M11 6.5l3-2v7l-3-2v-3z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            Video
          </button>
          <button class="format-tab" id="tabAudio" data-type="audio">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 12V4l8-2v8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="4" cy="12" r="2" stroke="currentColor" stroke-width="1.4"/><circle cx="12" cy="10" r="2" stroke="currentColor" stroke-width="1.4"/></svg>
            Audio (MP3)
          </button>
        </div>

        <div id="formatsContainer">
          <div class="formats-list" id="videoFormats"></div>
          <div class="formats-list" id="audioFormats" style="display:none;"></div>
        </div>
      </div>

      <button class="download-btn" id="downloadBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v9M5 9l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 15h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Format Seçin
      </button>
    </div>

    <!-- Download Progress -->
    <div class="progress-card" id="progressCard" style="display:none;">
      <div class="progress-info">
        <span class="progress-label" id="progressLabel">Yüklənir…</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-sub" id="progressSub"></p>
    </div>

    <!-- Success -->
    <div class="success-card" id="successCard" style="display:none;">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="#22C55E" stroke-width="1.5"/><path d="M8 14l4 4 8-8" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <p class="success-title">Yükləndi!</p>
      <p class="success-sub" id="successSub"></p>
      <button class="new-download-btn" id="newDownloadBtn">Yeni Yükləmə</button>
    </div>
  </main>

  <footer class="footer">
    <p>Yalnız şəxsi istifadə üçün · Müəllif hüquqlarına hörmət edin</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
